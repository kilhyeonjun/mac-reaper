# mac-reaper defaults
# Override in your shell profile before sourcing, or via environment variables.

# Log directory
REAPER_LOG_DIR="${REAPER_LOG_DIR:-$HOME/.mac-reaper/logs}"

# Dry-run mode: 1 = detect only, 0 = detect + kill
REAPER_DRY_RUN="${REAPER_DRY_RUN:-0}"

# Reentrancy lock directory (prevents overlapping runs)
REAPER_LOCK_DIR="${REAPER_LOCK_DIR:-$HOME/.mac-reaper/run.lock}"

# Self-healing lock retry (disabled by default)
# 0 = fail closed on busy lock, 1 = retry with backoff for transient overlap
REAPER_RETRY_ON_LOCK_SKIP="${REAPER_RETRY_ON_LOCK_SKIP:-0}"
REAPER_RETRY_LOCK_MAX_ATTEMPTS="${REAPER_RETRY_LOCK_MAX_ATTEMPTS:-1}"
REAPER_RETRY_LOCK_BACKOFF_SEC="${REAPER_RETRY_LOCK_BACKOFF_SEC:-5}"

# Minimum age in seconds before a process is considered stale (default: 1 hour)
REAPER_ORPHAN_MIN_AGE_SEC="${REAPER_ORPHAN_MIN_AGE_SEC:-3600}"

# Safety cap: maximum number of kills per run
REAPER_MAX_KILLS="${REAPER_MAX_KILLS:-200}"

# Signal sequence: first try graceful, then force
REAPER_SIGNAL_GRACE="${REAPER_SIGNAL_GRACE:-TERM}"
REAPER_SIGNAL_FORCE="${REAPER_SIGNAL_FORCE:-KILL}"
REAPER_GRACE_WAIT_SEC="${REAPER_GRACE_WAIT_SEC:-3}"

# Max log files to keep (rotate by day)
REAPER_LOG_RETAIN_DAYS="${REAPER_LOG_RETAIN_DAYS:-30}"

# ─── Target definitions ───
# Format: "process_name_pattern:condition"
# Matching mode is literal exact match against ps comm field.
# Conditions:
#   children=0  → only kill if no child processes
#   (none)      → kill all matching orphans
#
# All targets are filtered by PPID=1 (orphaned to launchd)
REAPER_TARGETS=(
  "opencode:children=0"
  "/bin/zsh:children=0"
  "fzf"
)
